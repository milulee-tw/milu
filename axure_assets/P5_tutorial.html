<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif}
.frame{width:430px;height:932px;position:relative;overflow:hidden;background:#0e1430}
.modalbg{position:absolute;inset:0;background:linear-gradient(165deg,#FFD3EC 0%,#C9B8FF 52%,#AEE3FF 100%)}
.spot{position:absolute;inset:0;background:rgba(10,8,30,.72)}
/* spotlight hole over progress bar */
.hole{position:absolute;top:150px;left:30px;right:30px;height:60px;border-radius:16px;box-shadow:0 0 0 9999px rgba(10,8,30,.72);background:transparent;border:3px dashed #FFD86B}
.holelabel{position:absolute;top:158px;left:30px;right:30px;text-align:center;color:#fff;font-size:14px;font-weight:800}
.arrow{position:absolute;top:222px;left:50%;transform:translateX(-50%);font-size:30px;color:#FFD86B}
.card{position:absolute;bottom:120px;left:34px;right:34px;background:#fff;border-radius:26px;padding:26px 24px;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.4)}
.ill{font-size:64px}
.ct{font-size:21px;font-weight:900;color:#4a2f7a;margin-top:6px}
.cb{font-size:14px;color:#6b5a93;margin-top:10px;line-height:1.5}
.dots{display:flex;justify-content:center;gap:8px;margin:16px 0 4px}
.dots i{width:9px;height:9px;border-radius:50%;background:#d8cdf0;display:inline-block}
.dots i.on{background:#8C6CF0;width:22px;border-radius:5px}
.row{display:flex;gap:12px;margin-top:14px}
.skip{flex:1;height:52px;border-radius:16px;border:2px solid #c9bdec;color:#7a6aa8;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800}
.next{flex:1.4;height:52px;border-radius:16px;background:linear-gradient(#FF8EC4,#c05bd6);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;box-shadow:0 8px 18px rgba(190,80,200,.45)}
.tag{position:absolute;top:18px;left:0;right:0;text-align:center;color:#FFD86B;font-size:12px;letter-spacing:2px}
</style></head><body>
<div class="frame">
  <div class="modalbg"></div>
  <div class="spot"></div>
  <div class="hole"></div>
  <div class="holelabel">押注就能集滿這條累積條</div>
  <div class="arrow">⬆</div>
  <div class="tag">P5 新手教學（步驟 1 / 2）</div>
  <div class="card">
    <div class="ill">📊</div>
    <div class="ct">押注就能集滿累積條</div>
    <div class="cb">每次押注都會累積進度，<br>跨過門檻就解鎖一次翻牌機會，<br>可自選任一格翻開挖寶！</div>
    <div class="dots"><i class="on"></i><i></i></div>
    <div class="row"><div class="skip">跳過</div><div class="next">下一步</div></div>
  </div>
</div>
</body></html>
